name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Deploy environment check
        run: npm run deploy:check

      - name: Check production trace
        run: npm run trace:check

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Start app
        run: |
          npm run start -- --port 3000 > /tmp/wikidata-explorer.log 2>&1 &
          echo $! > /tmp/wikidata-explorer.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/wikidata-explorer.log
          exit 1

      - name: Smoke routes
        run: npm run smoke
        env:
          SMOKE_BASE_URL: http://localhost:3000

      - name: Public metadata
        run: npm run metadata:check
        env:
          METADATA_BASE_URL: http://localhost:3000

      - name: API contract tests
        run: npm run api:contracts
        env:
          API_CONTRACT_BASE_URL: http://localhost:3000

      - name: Search interaction test
        run: npm run e2e
        env:
          E2E_BASE_URL: http://localhost:3000
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Performance budgets
        run: npm run perf:check
        env:
          PERF_BASE_URL: http://localhost:3000
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Visual QA
        run: npm run visual:qa
        env:
          VISUAL_QA_BASE_URL: http://localhost:3000
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Upload visual QA screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-screenshots
          path: .tmp/visual-qa/*.png
          if-no-files-found: ignore
