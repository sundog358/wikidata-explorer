name: AG2 Demo Proof

on:
  workflow_dispatch:
    inputs:
      app_base_url:
        description: AI-enabled Next app URL to verify
        required: true
        default: https://www.wikidataexplorer.com
      ag2_service_url:
        description: Hosted AG2 service URL used by the AI-enabled app
        required: true
        default: https://replace-with-hosted-ag2.example.com
      require_durable_monitor:
        description: Require the hosted observability receiver to report durable storage
        required: true
        type: boolean
        default: true

jobs:
  ag2-demo-proof:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight hosted AG2 proof
        env:
          AG2_DEMO_OBSERVABILITY_RECEIVER_TOKEN: ${{ secrets.AG2_DEMO_OBSERVABILITY_RECEIVER_TOKEN }}
          AG2_SERVICE_TOKEN: ${{ secrets.AG2_DEMO_SERVICE_TOKEN }}
          NEXT_PUBLIC_ENABLE_AI_AGENTS: "true"
          ENABLE_AI_AGENTS: "true"
          AI_AGENT_RATE_LIMIT_MAX: "20"
          AI_AGENT_RATE_LIMIT_WINDOW_MS: "60000"
          AG2_ENABLE_DOCS: "false"
          API_OBSERVABILITY_WEBHOOK_URL: ${{ inputs.app_base_url }}/api/observability/events
          API_OBSERVABILITY_WEBHOOK_TOKEN: ${{ secrets.AG2_DEMO_OBSERVABILITY_RECEIVER_TOKEN }}
        run: npm run portfolio:hosted:preflight -- --scope=ag2 --app-base-url="${{ inputs.app_base_url }}" --ag2-service-url="${{ inputs.ag2_service_url }}"

      - name: Run hosted AG2 proof
        env:
          AG2_DEMO_BASE_URL: ${{ inputs.app_base_url }}
          AG2_SERVICE_URL: ${{ inputs.ag2_service_url }}
          AG2_SERVICE_TOKEN: ${{ secrets.AG2_DEMO_SERVICE_TOKEN }}
          AG2_DEMO_OBSERVABILITY_RECEIVER_TOKEN: ${{ secrets.AG2_DEMO_OBSERVABILITY_RECEIVER_TOKEN }}
          AG2_DEMO_REQUIRE_DURABLE_OBSERVABILITY: ${{ inputs.require_durable_monitor }}
          NEXT_PUBLIC_SITE_URL: ${{ inputs.app_base_url }}
          NEXT_PUBLIC_ENABLE_AI_AGENTS: "true"
          ENABLE_AI_AGENTS: "true"
          AI_AGENT_RATE_LIMIT_MAX: "20"
          AI_AGENT_RATE_LIMIT_WINDOW_MS: "60000"
          AG2_ENABLE_DOCS: "false"
          API_OBSERVABILITY_WEBHOOK_URL: ${{ inputs.app_base_url }}/api/observability/events
          API_OBSERVABILITY_WEBHOOK_TOKEN: ${{ secrets.AG2_DEMO_OBSERVABILITY_RECEIVER_TOKEN }}
        run: |
          set -o pipefail
          npm run ag2:hosted:proof 2>&1 | tee ag2-hosted-proof.log

      - name: Summarize hosted AG2 evidence
        if: always()
        run: |
          set -o pipefail
          set +e
          npm run portfolio:evidence -- --dir=. --no-require-production --require-hosted-ag2 2>&1 | tee portfolio-evidence.log
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f portfolio-evidence-summary.md ]; then
            cat portfolio-evidence-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$STATUS"

      - name: Upload hosted AG2 proof log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ag2-hosted-proof-log
          path: |
            ag2-hosted-proof.log
            portfolio-evidence.log
            portfolio-evidence-summary.json
            portfolio-evidence-summary.md
          if-no-files-found: ignore
